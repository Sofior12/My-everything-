<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>App UI Bio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* top header */
.header {
  padding: 20px;
  text-align: center;
  background: linear-gradient(45deg, #00ffcc, #6a00ff);
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

/* profile */
.profile img {
  width: 80px;
  border-radius: 50%;
  border: 3px solid white;
}

.profile h2 {
  margin: 10px 0;
}

/* cards */
.card {
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.1);
}

/* links */
.link {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: linear-gradient(45deg, #00ffcc, #00ff66);
  text-align: center;
}

/* bottom nav */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav a {
  color: white;
  text-decoration: none;
  font-size: 18px;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="profile">
    <img src="https://i.imgur.com/6VBx3io.png">
    <h2>Sofior 😈</h2>
    <p>Welcome to my app</p>
  </div>
</div>

<!-- Main Content -->
<div class="card">
  <a class="link" href="#">📸 Instagram</a>
  <a class="link" href="#">💬 Telegram</a>
</div>

<!-- Bottom Navigation -->
<div class="nav">
  <a href="#">🏠</a>
  <a href="#">📊</a>
  <a href="#">💬</a>
  <a href="#">⚙️</a>
</div>

</body>
</html>
