<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sofior Bio</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* main box */
.container {
  width: 90%;
  max-width: 350px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  text-align: center;
  box-shadow: 0 0 30px rgba(0,255,0,0.2);
}

/* profile */
.profile img {
  width: 100px;
  border-radius: 50%;
  border: 3px solid lime;
}

h1 {
  margin: 10px 0;
}

/* neon button */
.link {
  display: block;
  margin: 15px 0;
  padding: 15px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  background: linear-gradient(45deg, #00ffcc, #00ff66);
  box-shadow: 0 0 10px #00ffcc, 0 0 20px #00ff66;
  transition: 0.3s;
}

.link:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffcc, 0 0 40px #00ff66;
}

/* special button */
.main-btn {
  margin-top: 20px;
  padding: 15px;
  border-radius: 30px;
  background: #6a00ff;
  box-shadow: 0 0 20px #6a00ff, 0 0 40px #6a00ff;
  display: block;
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">
    <img src="https://i.imgur.com/6VBx3io.png">
    <h1>Sofior 😈</h1>
    <p>Follow me everywhere 👇</p>
  </div>

  <a class="link" href="#">📸 Instagram</a>
  <a class="link" href="#">💬 Telegram</a>
  <a class="link" href="#">📺 YouTube</a>
  <a class="link" href="#">💸 Earn Money</a>

  <a class="main-btn" href="#">🚀 Get Started</a>

</div>

</body>
</html>
